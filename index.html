<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Portal</title>
    <style>
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 2px solid #000;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        button, .download-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .download-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Information Portal</h1>

    <section id="resources">
        <h2>Resources</h2>
        <p>Download the list of resources used in this project:</p>
        <a class="download-btn" href="Resources Used.pdf" download>
            ⬇ Download Resources Used (PDF)
        </a>
    </section>

    <section id="qr-codes">
        <h2>QR Code Storage</h2>
        <p>Here, you can generate and store QR codes.</p>
    </section>

    <section id="file-upload-download">
        <h2>File Upload/Download Section</h2>
        <form id="file-upload-form" enctype="multipart/form-data">
            <input type="file" name="file" id="file-input" required />
            <button type="submit">Upload</button>
        </form>
        <div id="file-list">
            <h3>Uploaded Files:</h3>
            <ul></ul>
        </div>
    </section>
</body>
</html>
